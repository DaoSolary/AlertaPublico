[build]
   command = "npm install && npm run build"
  publish = "dist"
  
[build.environment]
  NODE_VERSION = "18"
  CI = "false"
  NODE_ENV = "production"

# Headers para garantir que assets sejam servidos corretamente
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

# Redirects são configurados em public/_redirects
# Não duplicar aqui para evitar conflitos

